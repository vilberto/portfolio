name: Weekly auction summary

on:
  schedule:
    - cron: "0 11 * * 6"  # 21:00 AEST Saturday
  workflow_dispatch:

jobs:
  summary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # TODO: filter auction datetimes from seen listings → email summary
