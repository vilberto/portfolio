name: CI

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:
    branches:
      - main

jobs:
  lint-and-test-propwatch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: |
          pip install -r foundations/propwatch/requirements.txt
          pip install -r foundations/propwatch/requirements-dev.txt

      - run: ruff check .

      - run: pytest foundations/propwatch/tests/
