version: 2

seeds:
  - name: suburb_name_crosswalk
    description: >
      Maps source suburb name strings (lowercased, trimmed) to canonical ABS SAL_NAME21 strings.
      Used in mart joins: lower(trim(stg.suburb_name)) = source_suburb_lower → sal_name → sal_lookup.sal_code.
      Covers house price quarterly/series, unit price quarterly/series, and auction results.
      DFFH rent uses a separate seed (dffh_suburb_group_mapping).
    columns:
      - name: source_suburb_lower
        description: Suburb name from source data, lowercased and trimmed. Join key — must match lower(trim(stg.suburb_name)).
      - name: source
        description: >
          Dataset the mapping applies to — 'price' (house/unit price quarterly and series)
          or 'auction'. Filter on this column in each mart join so that a name mapping
          valid for auction is not applied to price data and vice versa.
      - name: sal_name
        description: Exact ABS SAL_NAME21 string — mixed case, matches sal_lookup.sal_name precisely. Do not lowercase.

  - name: school_name_crosswalk
    description: >
      Maps VCAA SSCAI (school, locality) pairs to canonical ACARA school names.
      Only covers schools that don't exact-match ACARA after lower() — 1-to-1
      exact matches join directly in the mart without a crosswalk entry.
      See seeds/school_crosswalk_notes.md for full methodology and the
      need_acara_suburb join pattern.
    columns:
      - name: vcaa_school
        description: VCAA school name, lowercased and trimmed. Part of composite key.
      - name: vcaa_locality
        description: VCAA locality, lowercased and trimmed. Part of composite key — required because same school name appears across unrelated schools in different localities.
      - name: acara_school_name
        description: Exact ACARA School Name string — mixed case, matches school_profile."School Name" precisely. Do not lowercase.
      - name: need_acara_suburb
        description: >
          Set to 'y' when ACARA has multiple records with the exact same school name
          (e.g. Marian College ×3, Sacred Heart College ×2). The mart join must add
          AND lower(acara.suburb) = vcaa_locality to resolve to the correct ACARA SML ID.
          See school_crosswalk_notes.md for the SQL pattern.
      - name: exclude
        description: >
          Set to 'y' for known sub-campus VCAA entries that must be suppressed before
          joining to ACARA. These rows have no acara_school_name. Their presence in the
          crosswalk prevents the fallback coalesce(acara_school_name, vcaa_school) from
          matching the same ACARA record as the main campus row.

  - name: dffh_suburb_group_mapping
    description: >
      Maps DFFH suburb group strings to canonical ABS SAL_NAME21 strings.
      One-to-many: a single suburb_group may map to multiple SAL rows.
      Group Total rows are excluded — they remain as region benchmarks with sal_code = null in stg_rent.
    columns:
      - name: suburb_group
        description: DFFH suburb group string exactly as it appears in the source data.
      - name: sal_name
        description: Exact ABS SAL_NAME21 string — mixed case, matches sal_lookup.sal_name precisely. Do not lowercase.
